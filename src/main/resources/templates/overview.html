<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Stats App</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/luxon@3"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1"></script>

    <link rel="stylesheet" href="/css/styles.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>

<!-- /* See also: https://materializecss.com/navbar.html */ -->
<nav>
    <div class="nav-wrapper blue darken-2">
        <a class="brand-logo left" style="padding-left:16px">
            <i class="material-icons">show_chart</i> Stats App
        </a>
    </div>
</nav>

<div class="chart-grid">
    <div class="chart-card" th:each="statistic : ${statistics}">

        <!--/*
            All data-* attributes  will be converted to dataset attributes on the canvas, which can later be
            accessed with the camel case name. For example: data-x-axis-name will become canvas.dataset.xAxisName
        */-->
        <canvas
                th:id="${statistic.id}"
                th:data-title="${statistic.title}"
                th:data-x-axis-name="${statistic.xAxisName}"
                th:data-y-axis-name="${statistic.yAxisName}"
                th:data-points="${statistic.dataPointsJson}"
                th:data-reverse="${statistic.reverse}"
                class="line-chart">
        </canvas>

        <a class="btn-floating btn-small blue add-btn">
            <i class="material-icons">add</i>
        </a>

        <div class="add-form">
            <label th:for="${statistic.id} + '-x'" th:text="${statistic.xAxisName}"></label>
            <input type="date" th:id="${statistic.id} + '-x'" class="input-x"/>

            <label th:for="${statistic.id} + '-y'" th:text="${statistic.yAxisName}"></label>
            <input type="number" th:id="${statistic.id} + '-y'" class="input-y" placeholder="Value"/>

            <a class="btn blue submit-btn">Add</a>
        </div>
    </div>

    <!-- new statistic card -->
    <div class="chart-card new-statistic-card">
        <h5>New Statistic</h5>

        <div class="new-statistic-form">
            <div class="input-field">
                <input type="text" id="new-id"/>
                <label for="new-id">ID</label>
            </div>
            <div class="input-field">
                <input type="text" id="new-title"/>
                <label for="new-title">Title</label>
            </div>
            <div class="input-field">
                <input type="text" id="new-x-axis-name"/>
                <label for="new-x-axis-name">X Axis Name</label>
            </div>
            <div class="input-field">
                <input type="text" id="new-y-axis-name"/>
                <label for="new-y-axis-name">Y Axis Name</label>
            </div>
        </div>

        <label>
            <input type="checkbox" id="new-inverted"/>
            <span>Reversed (lower = better)</span>
        </label>

        <h6>First Data Point</h6>
        <div class="new-statistic-form">
            <div class="input-field">
                <input type="date" id="new-point-x"/>
                <label for="new-point-x">Date</label>
            </div>
            <div class="input-field">
                <input type="number" id="new-point-y"/>
                <label for="new-point-y">Value</label>
            </div>
        </div>

        <a class="btn blue" id="create-btn">
            <i class="material-icons left">add</i>Create
        </a>
    </div>
</div>

<script src="/js/line-chart.js"></script>
<script src="/js/add-datapoint.js"></script>
<script src="/js/createStatistic.js"></script>

</body>
</html>
